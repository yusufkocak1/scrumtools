services:
  postgres:
    image: postgres:16
    container_name: scrumtools-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scrumtools}
      POSTGRES_USER: ${POSTGRES_USER:-scrumtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scrumtools123}
    volumes:
      - scrumtools-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scrumtools}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: scrumtools-minio
    restart: always
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-scrumtools}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-scrumtools123}
    volumes:
      - scrumtools-minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  scrumtools-postgres-data:
  scrumtools-minio-data:

