spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scrumtools}
    username: ${SPRING_DATASOURCE_USERNAME:scrumtools}
    password: ${SPRING_DATASOURCE_PASSWORD:scrumtools123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    schemas: scrumtools
    create-schemas: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8080

# ─── MinIO (S3-compatible object storage) ────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:scrumtools}
  secret-key: ${MINIO_SECRET_KEY:scrumtools123}
  bucket: ${MINIO_BUCKET:scrumtools-attachments}

app:
  cors:
    # Virgulle ayrilmis origin listesi (ornek: http://localhost:3000,http://SUNUCU_IP:8096)
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    # Prod ortamında JWT_SECRET env variable kullanın (min 32 karakter)
    secret: ${JWT_SECRET:ScrumToolsSuperSecretKeyForJWTSigningMustBe256Bits1yusuf}
    # Token süresi ms cinsinden (default: 24 saat)
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.scrumtools: DEBUG
    org.springframework.security: INFO

