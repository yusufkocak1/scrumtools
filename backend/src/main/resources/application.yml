spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scrumtools?currentSchema=scrumtools}
    username: ${SPRING_DATASOURCE_USERNAME:scrumtools}
    password: ${SPRING_DATASOURCE_PASSWORD:scrumtools123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: scrumtools
        format_sql: true
    show-sql: false

  flyway:
    enabled: false

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # ─── SMTP (app.mail.enabled=true iken kullanılır; lokalde Mailpit: port 1025) ─
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}

server:
  port: 8080

# ─── iyzico (iyzilink ödeme linkleri) ────────────────────────────────────────
iyzico:
  enabled: ${IYZICO_ENABLED:false}
  api-key: ${IYZICO_API_KEY:}
  secret-key: ${IYZICO_SECRET_KEY:}
  # Sandbox: https://sandbox-api.iyzipay.com | Prod: https://api.iyzipay.com
  base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

# ─── MinIO (S3-compatible object storage) ────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  # Tarayicinin presigned URL'lerle erisecegi public adres (bos ise endpoint kullanilir)
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
  access-key: ${MINIO_ACCESS_KEY:scrumtools}
  secret-key: ${MINIO_SECRET_KEY:scrumtools123}
  bucket: ${MINIO_BUCKET:scrumtools-attachments}

app:
  cors:
    # Virgulle ayrilmis origin listesi (ornek: http://localhost:3000,http://SUNUCU_IP:8096)
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  mail:
    # false iken mailler gönderilmez, log'a yazılır (LoggingMailService)
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@kocak.net.tr}
  # E-postalardaki linklerde kullanılan frontend adresi
  frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  jwt:
    # Prod ortamında JWT_SECRET env variable kullanın (min 32 karakter)
    secret: ${JWT_SECRET:ScrumToolsSuperSecretKeyForJWTSigningMustBe256Bits1yusuf}
    # Token süresi ms cinsinden (default: 24 saat)
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    com.scrumtools: DEBUG
    org.springframework.security: INFO

