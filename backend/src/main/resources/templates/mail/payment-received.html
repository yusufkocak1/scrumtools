<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,Helvetica,sans-serif;">
<div style="max-width:560px;margin:24px auto;background:#ffffff;border-radius:12px;overflow:hidden;">
  <div style="background:#10b981;padding:20px 32px;">
    <h1 style="color:#ffffff;font-size:20px;margin:0;">ScrumTools</h1>
  </div>
  <div style="padding:32px;">
    <p style="font-size:15px;color:#111827;">Merhaba <strong th:text="${name}">Kullanıcı</strong>,</p>
    <p style="font-size:14px;color:#374151;line-height:1.6;">
      Ödemeniz başarıyla alındı. <strong th:text="${orgName}">Organizasyon</strong> organizasyonunuzda
      <strong th:text="${planName}">Plan</strong> paketi aktif edildi.
    </p>
    <p style="font-size:14px;color:#374151;line-height:1.6;">
      Aboneliğiniz <strong th:text="${periodEnd}">tarih</strong> tarihine kadar geçerlidir.
      Teşekkür ederiz! 🎉
    </p>
  </div>
  <div style="padding:16px 32px;border-top:1px solid #e5e7eb;">
    <p style="font-size:11px;color:#9ca3af;margin:0;">Sorularınız için bu e-postayı yanıtlayabilirsiniz.</p>
  </div>
</div>
</body>
</html>
