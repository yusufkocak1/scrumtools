server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Backend'deki multipart limitleriyle uyumlu (max-request-size: 25MB)
    client_max_body_size 25M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Frontend SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html cache'lenmesin ki yeni deploy aninda gorunsun
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Hash'li build asset'leri uzun sure cache'lenebilir
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # REST API reverse proxy
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SockJS / WebSocket reverse proxy
    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # MinIO presigned URL passthrough.
    # Backend, presigned URL'lerdeki "http://minio:9000" host'unu public domain ile
    # degistirir (MINIO_PUBLIC_ENDPOINT); path bucket adiyla basladigi icin burada
    # yakalanir. Host header'i imza (SigV4) icin tekrar "minio:9000" yapilir.
    # NOT: Bucket adi degisirse (MINIO_BUCKET) bu location da guncellenmeli.
    location /scrumtools-attachments/ {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host minio:9000;
        proxy_buffering off;
    }
}
