
upstream portfolio-frontend {
    server portfolio-frontend:80;
}

upstream frontend {
    server scrumtools-frontend:80;
}

upstream backend {
    server scrumtools-backend:8080;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    # ─── ScrumTools ─────────────────────────────────────────────────────
    location /scrumtools/api/ {
        proxy_pass http://scrumtools-backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /scrumtools/ws/ {
        proxy_pass http://scrumtools-backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /scrumtools/ {
        proxy_pass http://scrumtools-frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /scrumtools {
        return 302 /scrumtools/;
    }


    # ─── Portfolyo (ana sayfa) ──────────────────────────────────────────
    # Eskiden burada "return 302 /scrumtools/;" vardı. Artık kök adres
    # gerçek ana sayfayı (bu repo) sunuyor.
    location / {
        proxy_pass http://portfolio-frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
